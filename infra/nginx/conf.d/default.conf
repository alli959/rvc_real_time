# =============================================================================
# MorphVox Platform - Nginx (HTTP only, SSL handled by host nginx)
# =============================================================================

# morphvox.net - Main site
server {
    listen 80;
    listen [::]:80;
    server_name morphvox.net;

    client_max_body_size 2G;

    # Voice Engine WebSocket
    location /ws {
        set $upstream_ws voice-engine:8765;
        proxy_pass http://$upstream_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 7d;
        proxy_send_timeout 7d;
        proxy_connect_timeout 7d;
    }

    # Voice Engine HTTP API
    location /voice-engine/ {
        set $upstream_voice voice-engine:8001;
        proxy_pass http://$upstream_voice/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 100M;
    }

    # Frontend (Next.js)
    location / {
        set $upstream_web web:3000;
        proxy_pass http://$upstream_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API (Laravel)
    location /api {
        set $upstream_api api:80;
        proxy_pass http://$upstream_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
        client_max_body_size 2G;
        proxy_request_buffering off;
        proxy_buffering off;
    }

    # Laravel Storage
    location /storage {
        set $upstream_storage api:80;
        proxy_pass http://$upstream_storage;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Laravel Sanctum
    location /sanctum {
        set $upstream_sanctum api:80;
        proxy_pass http://$upstream_sanctum;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

# admin.morphvox.net - Admin panel
server {
    listen 80;
    listen [::]:80;
    server_name admin.morphvox.net;

    client_max_body_size 2G;

    location / {
        set $upstream_admin api:80;
        proxy_pass http://$upstream_admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
    }

    location /health {
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
